databases:
  - name: cheatsheetmaker-db
    plan: free
    databaseName: cheatsheetmaker

services:
  - type: web
    name: cheatsheetmaker
    runtime: python
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL_EXTERNAL
        fromDatabase:
          name: cheatsheetmaker-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
